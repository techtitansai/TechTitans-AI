kind = "web"
previewPath = "/"
title = "TechTitans AI"
version = "1.0.0"
id = "artifacts/techtitans-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24127

[services.development]
run = "pnpm --filter @workspace/techtitans-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/techtitans-ai", "run", "build" ]
publicDir = "artifacts/techtitans-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24127"
BASE_PATH = "/"
